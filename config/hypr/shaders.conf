# name of the shader
$SCREEN_SHADER = "disable"
# Chemins explicites (~/.config) : ne pas utiliser $XDG_CONFIG_HOME ici — Hyprland
# l'évalue avant custom/env.conf sur certaines installs → "Screen shader path not found"
$SCREEN_SHADER_PATH = ~/.config/hypr/shaders/disable.frag
# path to the compiled shader // override this in '../hyde/config.toml'
$SCREEN_SHADER_COMPILED = ~/.config/hypr/shaders/.compiled.cache.glsl


