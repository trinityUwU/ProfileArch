# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

# Input method
# exec-once = fcitx5

exec-once = dbus-update-activation-environment --systemd DISPLAY=:1 WAYLAND_DISPLAY=wayland-1

# WPE Manager — démarre en fond après 4s (gère server.py + tray)
# Le chemin $HOME/wpe-manager est installé automatiquement par install.sh
exec-once = sleep 4 && /usr/bin/electron $HOME/wpe-manager/electron/main.js --no-sandbox

