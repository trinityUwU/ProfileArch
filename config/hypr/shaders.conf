# name of the shader
$SCREEN_SHADER = "disable"
# Utiliser $XDG_CONFIG_HOME (défini dans custom/env.conf AVANT ce fichier).
# Ne pas utiliser ~/.config ici : Hyprland ne développe pas toujours ~ pour
# decoration:screen_shader → "Screen shader path not found".
$SCREEN_SHADER_PATH = $XDG_CONFIG_HOME/hypr/shaders/disable.frag
# Shader compilé (copié depuis le repo ou généré par shaders.sh HyDE)
$SCREEN_SHADER_COMPILED = $XDG_CONFIG_HOME/hypr/shaders/.compiled.cache.glsl


