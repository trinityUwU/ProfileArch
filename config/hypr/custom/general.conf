# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/

# monitor=,addreserved, 0, 0, 0, 0 # Custom reserved area

# HDMI port: mirror display. To see device name, use `hyprctl monitors`

# --- Fond & hyprbars violet profond (override du brun terra cota) ---
misc {
    background_color = rgba(13111aFF)
}

plugin {
    hyprbars {
        bar_color = rgba(13111aFF)
        col.text = rgba(CBA6F7FF)
        hyprbars-button = rgb(CBA6F7), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(CBA6F7), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(CBA6F7), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

# --- Bordures & transparence personnalisées ---
general {
    border_size = 2
    col.active_border = rgba(4f4a59ee)
    col.inactive_border = rgba(4f4a5944)
}

decoration {
    active_opacity = 0.80
    inactive_opacity = 0.60

    blur {
        enabled = yes
        xray = false
        vibrancy = 0.2
        size = 6
        passes = 3
    }
}
